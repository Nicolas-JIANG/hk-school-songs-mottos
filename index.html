<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hong Kong School Songs and Mottos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Hong Kong Primary and Secondary School Songs and Mottos Search</h1>
      <p>Search schools by Chinese or English name, abbreviation, or district and view motto/song details.</p>
    </div>
  </header>

  <main class="container page">
    <section class="search-panel" aria-label="School search and filters">
      <label for="keyword" class="label">School name keyword</label>
      <div class="search-row">
        <input id="keyword" type="search" placeholder="e.g., 皇仁, St. Paul's, QES, DBS" autocomplete="off" />
        <button id="searchBtn" type="button">Search</button>
      </div>

      <div class="filter-row">
        <div>
          <label for="typeFilter" class="label">School type</label>
          <select id="typeFilter">
            <option value="">All</option>
            <option value="primary">Primary</option>
            <option value="secondary">Secondary</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label for="districtFilter" class="label">District</label>
          <select id="districtFilter">
            <option value="">All</option>
          </select>
        </div>
      </div>
    </section>

    <section class="results-header" aria-live="polite">
      <h2>Results</h2>
      <p id="resultCount"></p>
    </section>

    <section id="results" class="cards" aria-label="Search results"></section>
  </main>

  <footer class="footer container">
    <p><a href="about.html">About / Data Sources</a></p>
  </footer>

  <script src="data/schools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

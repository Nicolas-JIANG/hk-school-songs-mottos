# Nginx static-site configuration for the Hong Kong School Songs and Mottos project.
# Replace server_name and root with the real VM domain/path before enabling.
server {
    listen 80;
    listen [::]:80;

    server_name _;
    root /var/www/hk-school-songs-mottos;
    index index.html;
    charset utf-8;

    # Homepage.
    location = / {
        try_files /index.html =404;
    }

    # Public HTML pages.
    location ~ ^/(index|schools|detail|project-report|publications|seminar-videos|about)\.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Static assets.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ^~ /css/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    location ^~ /js/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Public project data files. This includes generated JSON/JS and committed source workbooks.
    location ^~ /data/ {
        try_files $uri =404;
        expires 5m;
        add_header Cache-Control "public";
    }

    # Block repository internals and maintenance files if the repo root is used as the Nginx root.
    location ~ (^|/)\. {
        deny all;
    }

    location ~ ^/(docs|scripts|deploy)(/|$) {
        deny all;
    }

    location ~* \.(md|py|sh|log)$ {
        deny all;
    }

    # Do not silently serve index.html for unknown paths; this site uses real static files.
    location / {
        return 404;
    }
}

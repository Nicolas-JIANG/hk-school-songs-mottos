# Nginx static-site configuration for the Hong Kong School Songs and Mottos project.
# This config is intended for direct VM deployment of https://mottoanthem.eduhk.hk.
# IT confirmed the SSL certificate and key are under /etc/nginx/ssl.
# Confirm the exact filenames with: sudo ls -l /etc/nginx/ssl

server_tokens off;

server {
    listen 80;
    listen [::]:80;
    server_name mottoanthem.eduhk.hk mottoanthem.ied.edu.hk;

    # Keep port 80 open only to redirect users and scanners to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mottoanthem.eduhk.hk mottoanthem.ied.edu.hk;

    root /var/www/hk-school-songs-mottos;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/nginx/ssl/mottoanthem.eduhk.hk.crt;
    ssl_certificate_key /etc/nginx/ssl/mottoanthem.eduhk.hk.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Scanner findings remediation: HSTS and defense-in-depth browser security headers.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src https://drive.google.com https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'self'; form-action 'none'; upgrade-insecure-requests" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(self), publickey-credentials-get=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Homepage.
    location = / {
        try_files /index.html =404;
    }

    # Public HTML pages.
    location ~ ^/(index|schools|detail|project-report|publications|seminar-videos|about)\.html$ {
        try_files $uri =404;
        expires -1;
    }

    # Static assets.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
    }

    location ^~ /css/ {
        try_files $uri =404;
        expires 1h;
    }

    location ^~ /js/ {
        try_files $uri =404;
        expires 1h;
    }

    # Public project data files. This includes generated JSON/JS and committed source workbooks.
    location ^~ /data/ {
        try_files $uri =404;
        expires 5m;
    }

    # Block repository internals and maintenance files if the repo root is used as the Nginx root.
    location ~ (^|/)\. {
        deny all;
    }

    location ~ ^/(docs|scripts|deploy|IT_report)(/|$) {
        deny all;
    }

    location ~* \.(md|py|sh|log)$ {
        deny all;
    }

    # Do not silently serve index.html for unknown paths; this site uses real static files.
    location / {
        return 404;
    }
}

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>學校資料庫 | 香港中小學校歌與校訓研究計劃</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="返回首頁">
      <span class="brand-mark">HK</span>
      <span>School Songs &amp; Mottos</span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="schools.html" aria-current="page">School Database</a>
      <a href="project-report.html">Project Report</a>
      <a href="publications.html">Publications</a>
      <a href="seminar-videos.html">Videos</a>
    </nav>
  </header>

  <main class="container page">
    <section class="page-hero compact">
      <p class="eyebrow">School Database</p>
      <h1>香港中小學校歌與校訓資料庫</h1>
      <p>可按 <code>校名</code>、<code>School Name</code> 搜尋，並以 <code>中學/小學</code>、<code>種類</code>、<code>地區</code>、<code>校網</code> 篩選。</p>
    </section>

    <section class="search-panel" aria-label="School search and filters">
      <label for="keyword" class="label">校名 / School Name</label>
      <div class="search-row">
        <input id="keyword" type="search" placeholder="例如：伊利沙伯中學 / Queen Elizabeth School" autocomplete="off" />
        <button id="searchBtn" type="button">搜尋</button>
      </div>

      <div class="filter-row">
        <div>
          <label for="schoolLevelFilter" class="label">中學/小學</label>
          <select id="schoolLevelFilter">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label for="categoryFilter" class="label">種類</label>
          <select id="categoryFilter">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label for="regionFilter" class="label">地區</label>
          <select id="regionFilter">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label for="districtFilter" class="label">校網</label>
          <select id="districtFilter">
            <option value="">全部</option>
          </select>
        </div>
      </div>
    </section>

    <section class="results-header" aria-live="polite">
      <h2>搜尋結果</h2>
      <p id="resultCount"></p>
    </section>

    <section id="results" class="cards" aria-label="Search results"></section>
  </main>

  <footer class="footer container">
    <p><a href="about.html">資料來源 / About</a></p>
  </footer>

  <script src="data/schools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
